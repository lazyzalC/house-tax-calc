<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房地產財務助手 - 陳佑浚監製</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --primary: #2c3e50; --accent: #d35400; --bg: #f4f7f6; --green: #27ae60; --blue: #2980b9; --light-blue: #eef2f7; }
        
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; background-color: #f4f7f6; }

        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding-bottom: 80px; }
        .wrapper { max-width: 800px; margin: 20px auto; padding: 0 15px; position: relative; z-index: 1; }
        
        /* 導覽分頁 */
        .tabs { display: flex; background: rgba(44, 62, 80, 0.9); border-radius: 12px 12px 0 0; overflow-x: auto; backdrop-filter: blur(5px); }
        .tab-btn { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; color: #bbb; min-width: 100px; font-size: 14px; }
        .tab-btn.active { background: white; color: var(--accent); border-top: 4px solid var(--accent); }
        
        /* 卡片效果 */
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 25px; 
            border-radius: 0 0 15px 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: none; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .card.active { display: block; }

        h2 { color: var(--primary); font-size: 20px; margin-top: 0; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        h3 { font-size: 15px; color: var(--primary); margin: 20px 0 10px 0; display: flex; align-items: center; opacity: 0.8; }
        h3::before { content: ""; display: inline-block; width: 4px; height: 15px; background: var(--accent); margin-right: 8px; }
        
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 12px; }
        .form-group { flex: 1; min-width: 240px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: white; }
        
        .tooltip { display: inline-block; position: relative; margin-left: 5px; cursor: help; background: #999; color: white; width: 18px; height: 18px; border-radius: 50%; text-align: center; font-size: 12px; line-height: 18px; }

        button { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: var(--accent); }

        .result-area { display: none; margin-top: 25px; padding: 20px; border-radius: 10px; background: rgba(238, 242, 247, 0.9); border: 1px solid #cbd5e0; }
        .res-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; }
        .res-highlight { font-size: 26px; color: #e74c3c; font-weight: bold; text-align: center; margin-top: 15px; line-height: 1.2; }

        /* 房仲名片 */
        .agent-banner { background: rgba(255, 255, 255, 0.8); margin-top: 30px; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.4); }
        .agent-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-contact { display: inline-block; margin-top: 10px; background: #00b900; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="wrapper">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab(event, 'tab1')">售屋房地合一</div>
        <div class="tab-btn" onclick="switchTab(event, 'tab2')">獲利倒推成交</div>
        <div class="tab-btn" onclick="switchTab(event, 'tab3')">租賃稅費試算</div>
    </div>

    <div id="tab1" class="card active">
        <h2>🏠 房地合一稅精算</h2>
        <div class="form-row">
            <div class="form-group"><label>購入總價 (萬)</label><input type="number" id="t1-buyPrice"></div>
            <div class="form-group"><label>裝修+規費+仲介費 (萬)</label><input type="number" id="t1-buyCost"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>預計賣出總價 (萬)</label><input type="number" id="t1-sellPrice"></div>
            <div class="form-group"><label>本次售屋仲介費 (萬)</label><input type="number" id="t1-sellAgency"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>土地漲價總數額 (萬)</label><input type="number" id="t1-landValue" value="0"></div>
            <div class="form-group"><label>持有年數</label><input type="number" id="t1-years" step="0.1"></div>
        </div>
        <button onclick="calcTaxMode()">開始精算稅額</button>
        <div id="res1" class="result-area">
            <div class="res-line"><span>課稅所得 (稅基)：</span><span id="res1-base">0</span> 萬</div>
            <div class="res-line"><span>適用稅率：</span><span id="res1-rate">0%</span></div>
            <div class="res-highlight">預估應納稅額：<span id="res1-total">0</span> 萬</div>
        </div>
    </div>

    <div id="tab2" class="card">
        <h2>💰 獲利目標倒推成交價</h2>
        <div class="form-group"><label>原始取得總成本 (買價+費+裝修)(萬)</label><input type="number" id="t2-fixedCost"></div>
        <div class="form-row">
            <div class="form-group"><label>我想「實拿」利潤 (萬)</label><input type="number" id="t2-profit"></div>
            <div class="form-group"><label>預計支付仲介費 (%)</label><input type="number" id="t2-agencyRate" value="4"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>持有年數</label><input type="number" id="t2-years"></div>
            <div class="form-group"><label>土地漲價總數額 (萬)</label><input type="number" id="t2-landValue" value="0"></div>
        </div>
        <button onclick="calcPriceMode()">倒推建議成交價</button>
        <div id="res2" class="result-area">
            <div class="res-highlight" style="color:var(--green)">建議成交價：<span id="res2-sell">0</span> 萬</div>
            <div class="res-line"><span>預估房地合一稅：</span><span id="res2-tax">0</span> 萬</div>
            <div class="res-line"><span>預估仲介費：</span><span id="res2-agency">0</span> 萬</div>
        </div>
    </div>

    <div id="tab3" class="card">
        <h2>📑 租賃稅費試算 (2026新制)</h2>
        <div class="form-group">
            <label id="rentLabel">輸入月租金額 (元)</label>
            <input type="number" id="rentInput" placeholder="請輸入金額">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>計算模式</label>
                <select id="rentMode">
                    <option value="1">由總額算實拿</option>
                    <option value="2">由實拿推總額</option>
                </select>
            </div>
            <div class="form-group">
                <label>承租人身份</label>
                <select id="tenantType">
                    <option value="company">公司法人 (代扣繳/健保)</option>
