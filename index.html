    <style>
        :root { --primary: #2c3e50; --accent: #d35400; --bg: #f4f7f6; --green: #27ae60; --light-blue: #eef2f7; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .wrapper { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        /* 分頁標籤 */
        .tabs { display: flex; background: #ddd; border-radius: 12px 12px 0 0; overflow: hidden; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; background: #eee; color: #666; }
        .tab-btn.active { background: white; color: var(--accent); border-top: 4px solid var(--accent); }
        
        .card { background: white; padding: 25px; border-radius: 0 0 15px 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); display: none; }
        .card.active { display: block; }

        h2 { color: var(--primary); font-size: 20px; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        h3 { font-size: 15px; color: var(--accent); margin: 20px 0 10px 0; display: flex; align-items: center; }
        h3::before { content: ""; display: inline-block; width: 4px; height: 15px; background: var(--accent); margin-right: 8px; }
        
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 12px; }
        .form-group { flex: 1; min-width: 240px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }

        button { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: var(--accent); }

        .res-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; }
