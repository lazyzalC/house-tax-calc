<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房地產財務助手 - 17年專家陳佑浚監製</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="房產稅算">

    <style>
        :root { --primary: #2c3e50; --accent: #d35400; --bg: #f4f7f6; --green: #27ae60; --light-blue: #eef2f7; }
        
        /* 動態背景容器 */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background-color: #f4f7f6;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding-bottom: 80px; }
        .wrapper { max-width: 800px; margin: 20px auto; padding: 0 15px; position: relative; z-index: 1; }
        
        /* 分頁標籤 */
        .tabs { display: flex; background: rgba(221, 221, 221, 0.8); border-radius: 12px 12px 0 0; overflow: hidden; backdrop-filter: blur(5px); }
        .tab-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; background: rgba(238, 238, 238, 0.5); color: #666; }
        .tab-btn.active { background: rgba(255, 255, 255, 0.9); color: var(--accent); border-top: 4px solid var(--accent); }
        
        /* 卡片半透明毛玻璃效果 */
        .card { 
            background: rgba(255, 255, 255, 0.85); 
            padding: 25px; 
            border-radius: 0 0 15px 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            display: none; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .card.active { display: block; }

        h2 { color: var(--primary); font-size: 20px; margin-top: 0; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 10px; }
        h3 { font-size: 15px; color: var(--accent); margin: 20px 0 10px 0; display: flex; align-items: center; }
        h3::before { content: ""; display: inline-block; width: 4px; height: 15px; background: var(--accent); margin-right: 8px; }
        
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 12px; }
        .form-group { flex: 1; min-width: 240px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: rgba(255, 255, 255, 0.9); }
        
        .tooltip { display: inline-block; position: relative; margin-left: 5px; cursor: help; background: #999; color: white; width: 18px; height: 18px; border-radius: 50%; text-align: center; font-size: 12px; line-height: 18px; }
        .tooltip:hover::after { content: "土地漲價總數額 = \A 當期公告土地現值 \A - 前次移轉現值 \A x 物價指數修正 \A (請直接查閱土增稅單最準確)"; position: absolute; left: 25px; top: 0; background: #333; color: white; padding: 10px; border-radius: 5px; width: 220px; white-space: pre-wrap; z-index: 10; font-weight: normal; font-size: 13px; text-align: left; }

        button { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        button:hover { background: var(--accent); transform: translateY(-2px); }

        .result-area { display: none; margin-top: 25px; padding: 20px; border-radius: 10px; background: rgba(238, 242, 247, 0.9); border: 1px solid #cbd5e0; }
        .res-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; }
        .res-highlight { font-size: 28px; color: #e74c3c; font-weight: bold; text-align: center; margin-top: 15px; }

        .agent-banner { 
            background: rgba(255, 255, 255, 0.8); 
            margin-top: 30px; 
            padding: 20px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            border: 1px solid rgba(255,255,255,0.4); 
            backdrop-filter: blur(10px);
        }
        .agent-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .agent-info b { font-size: 18px; color: var(--primary); }
        .btn-contact { display: inline-block; margin-top: 10px; background: #00b900; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 14px; transition: 0.3s; }
        .btn-contact:hover { background: #009800; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="wrapper">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab(event, 'tab1')">1. 我要算繳多少稅</div>
        <div class="tab-btn" onclick="switchTab(event, 'tab2')">2. 我想賺多少錢</div>
    </div>

    <div id="tab1" class="card active">
        <h2>🏠 房地合一稅詳細試算</h2>
        
        <h3>取得成本 (當年買入)</h3>
        <div class="form-row">
            <div class="form-group"><label>購入房屋總價 (萬元)</label><input type="number" id="t1-buyPrice"></div>
            <div class="form-group"><label>購入仲介費 (萬元)</label><input type="number" id="t1-buyAgency"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>代書費/規費/印花稅 (萬元)</label><input type="number" id="t1-buyFee"></div>
            <div class="form-group"><label>裝修費用發票總額 (萬元)</label><input type="number" id="t1-renovation"></div>
        </div>

        <h3>售出資訊 (本次交易)</h3>
        <div class="form-row">
            <div class="form-group"><label>預計賣出總價 (萬元)</label><input type="number" id="t1-sellPrice"></div>
            <div class="form-group"><label>本次仲介費/廣告費 (萬元)</label><input type="number" id="t1-sellAgency"></div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>土地漲價總數額 (萬元) <span class="tooltip">?</span></label>
                <input type="number" id="t1-landValue" value="0">
            </div>
            <div class="form-group"><label>持有年數 (年)</label><input type="number" id="t1-years" step="0.1"></div>
        </div>

        <button onclick="calcTaxMode()">精算稅額結果</button>

        <div id="res1" class="result-area">
            <div class="res-line"><span>總扣除成本與費用：</span><span id="res1-cost">0</span> 萬</div>
            <div class="res-line"><span>課稅所得 (稅基)：</span><span id="res1-base">0</span> 萬</div>
            <div class="res-line"><span>適用稅率：</span><span id="res1-rate">0%</span></div>
            <div class="res-highlight">預估應納稅額：<span id="res1-total">0</span> 萬</div>
        </div>
    </div>

    <div id="tab2" class="card">
        <h2>💰 目標獲利倒推成交價</h2>
        
        <h3>基本固定成本</h3>
        <div class="form-row">
            <div class="form-group"><label>原始購入總價 (萬元)</label><input type="number" id="t2-buyPrice"></div>
            <div class="form-group"><label>持有年數 (年)</label><input type="number" id="t2-years"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>購入時仲介費+代書費 (萬元)</label><input type="number" id="t2-buyOther"></div>
            <div class="form-group"><label>裝修發票總額 (萬元)</label><input type="number" id="t2-renovation"></div>
        </div>

        <h3>獲利目標與變動費率</h3>
        <div class="form-row">
            <div class="form-group"><label>我想「實拿」利潤 (萬元)</label><input type="number" id="t2-profit" placeholder="扣除所有稅費後的錢"></div>
            <div class="form-group"><label>預計支付仲介費 (%)</label><input type="number" id="t2-agencyRate" value="4"></div>
        </div>
        <div class="form-group">
            <label>土地漲價總數額 (萬元) <span class="tooltip">?</span></label>
            <input type="number" id="t2-landValue" value="0">
        </div>

        <button onclick="calcPriceMode()">倒推建議成交價</button>

        <div id="res2" class="result-area">
            <div class="res-highlight" style="color:var(--green)">建議成交總價：<span id="res2-sell">0</span> 萬</div>
            <p style="font-size:14px; color:#555; line-height:1.8; border-top:1px solid #ccc; padding-top:10px;">
                ● 預估房地合一稅：<span id="res2-tax">0</span> 萬<br>
                ● 預估仲介費：<span id="res2-agency">0</span> 萬<br>
                ● 總成本扣除：<span id="res2-totalCost">0</span> 萬 (含買入及稅費)<br>
                <b>● 實拿獲利：約 <span id="res2-final">0</span> 萬</b>
            </p>
        </div>
    </div>

    <div class="agent-banner">
        <img src="https://i.ibb.co/yBmSR26p/IMG-1225.jpg" class="agent-img">
        <div class="agent-info">
            <b>陳佑浚 (柚子) | 房產財務規劃專家</b><br>
            <small>17年實務經驗，精準掌握房地合一稅務配置</small><br>
            <a href="https://line.me/ti/p/GzMOmMKQo4" class="btn-contact">💬 傳合約給我幫您精算</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
    /* 啟動 Service Worker 離線功能 */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('離線功能準備就緒！'))
                .catch(err => console.log('離線功能啟動失敗', err));
        });
    }

    /* 初始化背景特效 */
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#2c3e50" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.2 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#2c3e50", "opacity": 0.2, "width": 1 },
            "move": { "enable": true, "speed": 1.5, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true }
        },
        "retina_detect": true
    });

    function switchTab(evt, tabId) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function getRate(y) {
        if (y <= 2) return 0.45;
        if (y <= 5) return 0.35;
        if (y <= 10) return 0.20;
        return 0.15;
    }

    function calcTaxMode() {
        const buy = parseFloat(document.getElementById('t1-buyPrice').value) || 0;
        const buyAg = parseFloat(document.getElementById('t1-buyAgency').value) || 0;
        const buyFee = parseFloat(document.getElementById('t1-buyFee').value) || 0;
        const reno = parseFloat(document.getElementById('t1-renovation').value) || 0;
        const sell = parseFloat(document.getElementById('t1-sellPrice').value) || 0;
        const sellAg = parseFloat(document.getElementById('t1-sellAgency').value) || 0;
        const land = parseFloat(document.getElementById('t1-landValue').value) || 0;
        const years = parseFloat(document.getElementById('t1-years').value) || 0;

        const totalCost = buy + buyAg + buyFee + reno;
        let taxBase = sell - totalCost - sellAg - land;
        if (taxBase < 0) taxBase = 0;
        
        const rate = getRate(years);
        const tax = taxBase * rate;

        document.getElementById('res1-cost').innerText = (totalCost + sellAg).toFixed(1);
        document.getElementById('res1-base').innerText = taxBase.toFixed(1);
        document.getElementById('res1-rate').innerText = (rate * 100) + "%";
        document.getElementById('res1-total').innerText = tax.toFixed(2);
        document.getElementById('res1').style.display = 'block';
    }

    function calcPriceMode() {
        const buy = parseFloat(document.getElementById('t2-buyPrice').value) || 0;
        const buyOther = parseFloat(document.getElementById('t2-buyOther').value) || 0;
        const reno = parseFloat(document.getElementById('t2-renovation').value) || 0;
        const targetProfit = parseFloat(document.getElementById('t2-profit').value) || 0;
        const years = parseFloat(document.getElementById('t2-years').value) || 0;
        const agRate = (parseFloat(document.getElementById('t2-agencyRate').value) || 0) / 100;
        const land = parseFloat(document.getElementById('t2-landValue').value) || 0;
        const rate = getRate(years);

        const fixedCost = buy + buyOther + reno;
        let sell = buy + targetProfit + 10; 
        let tax = 0;
        let agencyFee = 0;

        for (let i = 0; i < 200; i++) {
            agencyFee = sell * agRate;
            let taxBase = sell - fixedCost - agencyFee - land;
            tax = taxBase > 0 ? taxBase * rate : 0;
            let currentProfit = sell - fixedCost - agencyFee - tax;
            if (Math.abs(currentProfit - targetProfit) < 0.1) break;
            sell += (targetProfit - currentProfit);
        }

        document.getElementById('res2-sell').innerText = Math.round(sell);
        document.getElementById('res2-tax').innerText = tax.toFixed(1);
        document.getElementById('res2-agency').innerText = agencyFee.toFixed(1);
        document.getElementById('res2-totalCost').innerText = (fixedCost + tax + agencyFee).toFixed(1);
        document.getElementById('res2-final').innerText = targetProfit;
        document.getElementById('res2').style.display = 'block';
    }
</script>

</body>
</html>
